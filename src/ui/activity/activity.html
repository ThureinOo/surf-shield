<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>Surf Shield activity</title>
  <meta http-equiv="Content-Security-Policy" content="default-src 'self'; script-src 'self'; style-src 'self' 'unsafe-inline'; frame-ancestors 'none';" />
  <style>
    :root { color-scheme: light dark; }
    body {
      font-family: -apple-system, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
      margin: 0;
      background: #0e1220;
      color: #e6e8ef;
    }
    .wrap { max-width: 900px; margin: 0 auto; padding: 32px 24px 80px; }
    header {
      display: flex; align-items: center; gap: 12px;
      padding-bottom: 20px; border-bottom: 1px solid #232841; margin-bottom: 20px;
    }
    .logo { font-size: 24px; }
    h1 { font-size: 22px; margin: 0; font-weight: 600; }
    .subtitle { color: #9aa0b4; margin: 4px 0 0; font-size: 14px; }
    .meta {
      display: flex; align-items: center; justify-content: space-between;
      margin: 8px 0 20px;
      color: #9aa0b4; font-size: 13px;
    }
    button.clear {
      background: transparent; border: 1px solid #3b3f5c;
      color: #e6e8ef; padding: 6px 12px; border-radius: 6px;
      font-size: 13px; cursor: pointer;
    }
    button.clear:hover { background: #1a1f3a; }
    table {
      width: 100%; border-collapse: collapse; font-size: 14px;
      background: #141935; border-radius: 8px; overflow: hidden;
    }
    thead th {
      text-align: left; padding: 12px 16px;
      background: #1b2043; color: #9aa0b4;
      font-weight: 600; font-size: 12px; text-transform: uppercase;
      letter-spacing: 0.04em;
    }
    tbody td {
      padding: 12px 16px; border-top: 1px solid #232841;
    }
    tbody tr:hover { background: #1a1f3a; }
    .host { font-family: ui-monospace, SFMono-Regular, Menlo, monospace; word-break: break-all; }
    .when { color: #9aa0b4; white-space: nowrap; }
    .empty {
      padding: 40px; text-align: center; color: #9aa0b4;
      background: #141935; border-radius: 8px;
    }
    .footer { color: #6a708c; font-size: 12px; margin-top: 20px; text-align: center; }
    .back {
      color: #7ea1ff; text-decoration: none; font-size: 13px;
    }
    .back:hover { text-decoration: underline; }
    .totals { color: #9aa0b4; font-size: 13px; }
    .badge {
      display: inline-block; margin-left: 6px; font-size: 11px;
      background: #2c3358; color: #9aa0b4; padding: 2px 6px; border-radius: 4px;
    }
  </style>
</head>
<body>
  <div class="wrap">
    <header>
      <span class="logo">&#128737;</span>
      <div>
        <h1 id="title">Activity</h1>
        <p class="subtitle" id="subtitle">Sites that triggered this counter recently.</p>
      </div>
    </header>

    <div class="meta">
      <span class="totals" id="totals"></span>
      <button class="clear" id="clear">Clear all activity</button>
    </div>

    <div id="content"></div>

    <p class="footer">
      Rolling window of the last 300 events. Old entries are pruned automatically.
      All data stays on this device.
    </p>
  </div>

  <script src="activity.js"></script>
</body>
</html>
