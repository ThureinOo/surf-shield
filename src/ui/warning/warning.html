<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta http-equiv="Content-Security-Policy" content="default-src 'self'; script-src 'self'; style-src 'self' 'unsafe-inline'; frame-ancestors 'none';" />
  <title>Blocked by Surf Shield</title>
  <style>
    :root { color-scheme: dark; }
    * { box-sizing: border-box; }
    body {
      margin: 0;
      font-family: -apple-system, "Segoe UI", Roboto, sans-serif;
      background: linear-gradient(180deg, #0e1220 0%, #16213e 100%);
      color: #e6e8ef;
      display: flex;
      align-items: flex-start;
      justify-content: center;
      min-height: 100vh;
      padding: 48px 16px;
    }
    .card {
      max-width: 640px;
      width: 100%;
      background: #141935;
      border: 1px solid #2c3358;
      border-top: 4px solid #e74c3c;
      border-radius: 12px;
      padding: 32px;
      box-shadow: 0 20px 40px rgba(0, 0, 0, 0.4);
    }
    .card.download { border-top-color: #f39c12; }
    .card.blocked  { border-top-color: #9b59b6; }
    header { display: flex; align-items: baseline; gap: 12px; margin-bottom: 8px; }
    .icon { font-size: 24px; }
    h1 {
      color: #ff6b6b;
      font-size: 22px;
      font-weight: 600;
      margin: 0;
    }
    .card.download h1 { color: #f39c12; }
    .card.blocked h1  { color: #b479db; }
    .subtitle {
      color: #9aa0b4;
      font-size: 14px;
      margin: 0 0 24px;
      line-height: 1.5;
    }
    .section {
      margin: 20px 0;
    }
    .section-label {
      display: block;
      font-size: 11px;
      color: #6a708c;
      text-transform: uppercase;
      letter-spacing: 0.06em;
      margin-bottom: 8px;
      font-weight: 600;
    }
    .url {
      word-break: break-all;
      background: #0f172a;
      padding: 12px 14px;
      border-radius: 8px;
      font-family: ui-monospace, SFMono-Regular, Menlo, monospace;
      font-size: 13px;
      color: #d8dbe6;
      line-height: 1.5;
      white-space: pre-line;
    }
    .punycode-note {
      margin-top: 8px;
      padding: 10px 12px;
      background: #3a2814;
      border-left: 3px solid #f39c12;
      border-radius: 4px;
      font-size: 13px;
      color: #f5cb6e;
      line-height: 1.5;
    }
    .chain {
      display: flex;
      flex-wrap: wrap;
      align-items: center;
      gap: 6px;
      background: #0f172a;
      padding: 12px 14px;
      border-radius: 8px;
      font-family: ui-monospace, SFMono-Regular, Menlo, monospace;
      font-size: 13px;
      line-height: 1.7;
    }
    .chain .hop { color: #d8dbe6; }
    .chain .hop.last { color: #ff6b6b; font-weight: 600; }
    .chain .arrow { color: #6a708c; }
    .reasons {
      margin: 0;
      padding: 0;
      list-style: none;
    }
    .reasons li {
      background: #0f172a;
      border-left: 3px solid #f39c12;
      padding: 10px 12px;
      margin-bottom: 6px;
      border-radius: 4px;
      font-size: 14px;
      color: #f5cb6e;
      line-height: 1.5;
    }
    .actions {
      display: flex;
      flex-wrap: wrap;
      gap: 10px;
      margin-top: 28px;
      padding-top: 20px;
      border-top: 1px solid #2c3358;
    }
    button {
      padding: 12px 20px;
      border: none;
      border-radius: 8px;
      font-size: 14px;
      font-weight: 600;
      cursor: pointer;
      font-family: inherit;
      transition: transform 0.05s, background 0.15s;
    }
    button:active { transform: scale(0.98); }
    #back {
      background: #27ae60;
      color: #fff;
    }
    #back:hover { background: #2ecc71; }
    #proceed {
      background: transparent;
      color: #9aa0b4;
      border: 1px solid #3b3f5c;
    }
    #proceed:hover { background: #1a1f3a; color: #d8dbe6; }
    .footer {
      margin-top: 20px;
      font-size: 12px;
      color: #6a708c;
      text-align: center;
    }
    .footer a { color: #7ea1ff; text-decoration: none; }
    .footer a:hover { text-decoration: underline; }
  </style>
</head>
<body>
  <div class="card" id="card">
    <header>
      <span class="icon" id="icon">&#9888;</span>
      <h1 id="title">Blocked by Surf Shield</h1>
    </header>
    <p class="subtitle" id="subtitle">This page was flagged as dangerous before it loaded.</p>

    <div class="section">
      <span class="section-label">Blocked URL</span>
      <div class="url" id="blocked-url"></div>
      <div class="punycode-note" id="punycode-note" hidden></div>
    </div>

    <div class="section" id="chain-section" hidden>
      <span class="section-label">Redirect chain</span>
      <div class="chain" id="chain-viz"></div>
    </div>

    <div class="section" id="reasons-section">
      <span class="section-label">Why it was blocked</span>
      <ul class="reasons" id="reasons"></ul>
    </div>

    <div class="actions">
      <button id="back">Go back to safety</button>
      <button id="proceed">Proceed anyway</button>
    </div>

    <div class="footer" id="footer"></div>
  </div>
  <script src="warning.js"></script>
</body>
</html>
